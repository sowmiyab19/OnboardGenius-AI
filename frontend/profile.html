<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings - OnboardGenius AI</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>

    <!-- Sidebar Mounted here -->
    <div id="sidebar-root"></div>

    <!-- Main Wrapper -->
    <div class="main-wrapper">
        <div class="container-fluid fade-in">
            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
                <div>
                    <h1 class="fw-bold h2 mb-1">Profile Settings</h1>
                    <p class="text-muted mb-0">Manage your onboarding profile details and password.</p>
                </div>
            </div>

            <div class="row g-4">
                <!-- Left: Account info and Employee Details Form -->
                <div class="col-lg-8">
                    <div class="premium-card">
                        <h5 class="fw-bold mb-4"><i class="bi bi-person-fill text-primary"></i> Personal Details</h5>
                        <form id="profile-form">
                            <input type="hidden" id="employee-id">
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="first-name" class="form-label fw-semibold">First Name</label>
                                    <input type="text" class="form-control" id="first-name" required placeholder="e.g. John">
                                </div>
                                <div class="col-md-6">
                                    <label for="last-name" class="form-label fw-semibold">Last Name</label>
                                    <input type="text" class="form-control" id="last-name" required placeholder="e.g. Doe">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="phone" class="form-label fw-semibold">Phone Number</label>
                                <input type="text" class="form-control" id="phone" placeholder="e.g. +1 555-0199">
                            </div>

                            <!-- Readonly values for Employee (only HR can edit these) -->
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="department" class="form-label fw-semibold">Department</label>
                                    <input type="text" class="form-control" id="department" placeholder="e.g. Engineering">
                                </div>
                                <div class="col-md-6">
                                    <label for="position" class="form-label fw-semibold">Position</label>
                                    <input type="text" class="form-control" id="position" placeholder="e.g. Software Engineer">
                                </div>
                            </div>
                            <div class="row mb-4">
                                <div class="col-md-6">
                                    <label for="hire-date" class="form-label fw-semibold">Hire Date</label>
                                    <input type="date" class="form-control" id="hire-date">
                                </div>
                                <div class="col-md-6">
                                    <label for="onboarding-status" class="form-label fw-semibold">Status</label>
                                    <select class="form-select" id="onboarding-status">
                                        <option value="pending">Pending</option>
                                        <option value="in_progress">In Progress</option>
                                        <option value="completed">Completed</option>
                                    </select>
                                </div>
                            </div>
                            
                            <button type="submit" class="btn btn-gradient px-4 py-2">Save Details</button>
                        </form>
                    </div>
                </div>

                <!-- Right: Password Reset Card -->
                <div class="col-lg-4">
                    <div class="premium-card mb-4">
                        <h5 class="fw-bold mb-3"><i class="bi bi-shield-lock-fill text-primary"></i> Account Login</h5>
                        <div class="mb-3">
                            <label class="form-label text-muted small text-uppercase fw-bold mb-1">Email Address</label>
                            <div id="account-email" class="fw-bold text-dark">-</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small text-uppercase fw-bold mb-1">Role Type</label>
                            <div id="account-role" class="fw-bold text-primary text-uppercase">-</div>
                        </div>
                    </div>

                    <div class="premium-card">
                        <h5 class="fw-bold mb-3"><i class="bi bi-key-fill text-primary"></i> Reset Password</h5>
                        <form id="password-form">
                            <div class="mb-3">
                                <label for="new-password" class="form-label fw-semibold">New Password</label>
                                <input type="password" class="form-control" id="new-password" required placeholder="Min 6 characters">
                            </div>
                            <button type="submit" class="btn btn-outline-primary w-100 py-2">Change Password</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/config.js"></script>
    <script src="static/js/auth.js"></script>
    <script src="static/js/api.js"></script>
    <script src="static/js/main.js"></script>
    <script>
        let currentUserId = null;
        let isHrUser = false;

        async function loadProfile() {
            UI.showLoader();
            try {
                const user = await API.get("/auth/me");
                currentUserId = user.id;
                isHrUser = (user.role === "admin" || user.role === "hr");

                document.getElementById("account-email").textContent = user.email;
                document.getElementById("account-role").textContent = user.role;

                // Adjust HR/Employee inputs
                if (!isHrUser) {
                    document.getElementById("department").readOnly = true;
                    document.getElementById("position").readOnly = true;
                    document.getElementById("hire-date").readOnly = true;
                    document.getElementById("onboarding-status").disabled = true;
                }

                // Try to load employee profile
                try {
                    const emp = await API.get(`/employees/user/${user.id}`);
                    document.getElementById("employee-id").value = emp.id;
                    document.getElementById("first-name").value = emp.first_name;
                    document.getElementById("last-name").value = emp.last_name;
                    document.getElementById("phone").value = emp.phone || "";
                    document.getElementById("department").value = emp.department || "";
                    document.getElementById("position").value = emp.position || "";
                    document.getElementById("hire-date").value = emp.hire_date || "";
                    document.getElementById("onboarding-status").value = emp.onboarding_status;
                } catch (e) {
                    // Profile does not exist yet (first sign-in)
                    UI.showAlert("Welcome! Please complete your employee profile details.", "info");
                    
                    // Pre-fill hire date with today's date if empty
                    document.getElementById("hire-date").value = new Date().toISOString().split('T')[0];
                }
            } catch (error) {
                UI.showAlert(error.message, "error");
            } finally {
                UI.hideLoader();
            }
        }

        document.getElementById("profile-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const empId = document.getElementById("employee-id").value;

            const payload = {
                first_name: document.getElementById("first-name").value,
                last_name: document.getElementById("last-name").value,
                phone: document.getElementById("phone").value || null,
                department: document.getElementById("department").value || null,
                position: document.getElementById("position").value || null,
                hire_date: document.getElementById("hire-date").value,
                onboarding_status: document.getElementById("onboarding-status").value
            };

            UI.showLoader();
            try {
                if (empId) {
                    // Update profile
                    await API.put(`/employees/${empId}`, payload);
                    UI.showAlert("Profile details updated successfully.");
                } else {
                    // Create profile (first setup)
                    payload.user_id = currentUserId;
                    const newEmp = await API.post("/employees/", payload);
                    document.getElementById("employee-id").value = newEmp.id;
                    UI.showAlert("Employee profile created successfully!");
                }
                await loadProfile();
            } catch (error) {
                UI.showAlert(error.message, "error");
            } finally {
                UI.hideLoader();
            }
        });

        document.getElementById("password-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const password = document.getElementById("new-password").value;

            UI.showLoader();
            try {
                // Endpoint uses admin user update. OnboardGenius supports updating passwords for user IDs.
                await API.put(`/users/${currentUserId}`, { password });
                UI.showAlert("Password successfully changed.");
                document.getElementById("new-password").value = "";
            } catch (error) {
                UI.showAlert(error.message, "error");
            } finally {
                UI.hideLoader();
            }
        });

        // Init
        if (Auth.isAuthenticated()) {
            loadProfile();
        }
    </script>
</body>
</html>
