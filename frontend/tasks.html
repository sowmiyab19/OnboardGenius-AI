<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Checklist - OnboardGenius AI</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>

    <!-- Sidebar Mounted here -->
    <div id="sidebar-root"></div>

    <!-- Main Wrapper -->
    <div class="main-wrapper">
        <div class="container-fluid fade-in">
            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
                <div>
                    <h1 class="fw-bold h2 mb-1">Onboarding Checklist</h1>
                    <p class="text-muted mb-0">Track compliance, equipment setup, and training status.</p>
                </div>
                <div id="create-task-wrapper" class="d-none">
                    <button class="btn btn-gradient" data-bs-toggle="modal" data-bs-target="#taskModal" onclick="openCreateModal()">
                        <i class="bi bi-clipboard-plus"></i> Create Task
                    </button>
                </div>
            </div>

            <!-- Tasks list -->
            <div class="row">
                <div class="col-lg-12">
                    <div class="premium-card">
                        <div class="table-responsive">
                            <table class="table align-middle mb-0">
                                <thead>
                                    <tr>
                                        <th style="width: 50px;">Status</th>
                                        <th>Task Description</th>
                                        <th>Assigned Employee</th>
                                        <th>Due Date</th>
                                        <th class="text-end">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="tasks-table-body">
                                    <tr>
                                        <td colspan="5" class="text-center py-4 text-muted">No onboarding tasks assigned yet.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Task Form Modal (HR/Admin only) -->
    <div class="modal fade" id="taskModal" tabindex="-1" aria-labelledby="taskModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-dark text-white border-0">
                    <h5 class="modal-title fw-bold" id="taskModalLabel">Onboarding Task</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="task-form">
                    <input type="hidden" id="edit-task-id">
                    <div class="modal-body py-4">
                        <div class="mb-3">
                            <label for="task-title" class="form-label fw-semibold">Task Title</label>
                            <input type="text" class="form-control" id="task-title" required placeholder="e.g. Set up laptop credentials">
                        </div>
                        <div class="mb-3">
                            <label for="task-desc" class="form-label fw-semibold">Description</label>
                            <textarea class="form-control" id="task-desc" rows="3" placeholder="Additional details or steps..."></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="task-due" class="form-label fw-semibold">Due Date</label>
                            <input type="date" class="form-control" id="task-due" required>
                        </div>
                        <div class="mb-3">
                            <label for="task-assignee" class="form-label fw-semibold">Assign Employee</label>
                            <select class="form-select" id="task-assignee" required>
                                <option value="">-- Select Employee --</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer border-0">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-gradient">Save Task</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/auth.js"></script>
    <script src="static/js/api.js"></script>
    <script src="static/js/main.js"></script>
    <script>
        let isHrUser = false;
        let currentEmployeeProfile = null;

        async function initTasks() {
            UI.showLoader();
            try {
                const user = await API.get("/auth/me");
                isHrUser = (user.role === "admin" || user.role === "hr");

                if (isHrUser) {
                    document.getElementById("create-task-wrapper").classList.remove("d-none");
                }

                // If regular employee, try to get profile first
                if (!isHrUser) {
                    try {
                        currentEmployeeProfile = await API.get(`/employees/user/${user.id}`);
                    } catch (e) {
                        UI.showAlert("Please complete your employee profile first.", "error");
                        return;
                    }
                }

                await loadTasksList();
            } catch (error) {
                UI.showAlert(error.message, "error");
            } finally {
                UI.hideLoader();
            }
        }

        async function loadTasksList() {
            try {
                let tasks = [];
                let employees = [];
                
                if (isHrUser) {
                    tasks = await API.get("/tasks");
                    employees = await API.get("/employees");
                } else {
                    tasks = await API.get(`/tasks/employee/${currentEmployeeProfile.id}`);
                }

                const tbody = document.getElementById("tasks-table-body");
                if (tasks.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" class="text-center py-4 text-muted">No onboarding tasks assigned yet.</td></tr>`;
                    return;
                }

                tbody.innerHTML = tasks.map(task => {
                    let employeeName = "Your Profile";
                    if (isHrUser) {
                        const emp = employees.find(e => e.id === task.employee_id);
                        employeeName = emp ? `${emp.first_name} ${emp.last_name}` : `ID: ${task.employee_id}`;
                    }

                    const isCompleted = task.status === "completed";
                    
                    return `
                        <tr>
                            <td>
                                <div class="form-check fs-5 mb-0">
                                    <input class="form-check-input" type="checkbox" ${isCompleted ? 'checked' : ''} onclick="toggleTaskStatus(${task.id}, this)">
                                </div>
                            </td>
                            <td>
                                <div class="fw-bold ${isCompleted ? 'text-decoration-line-through text-muted' : ''}">${task.title}</div>
                                <small class="text-muted">${task.description || ''}</small>
                            </td>
                            <td>${employeeName}</td>
                            <td>${task.due_date ? new Date(task.due_date).toLocaleDateString() : 'No date'}</td>
                            <td class="text-end">
                                ${isHrUser ? `
                                    <button class="btn btn-sm btn-outline-primary me-1" onclick="openEditModal(${task.id})">
                                        <i class="bi bi-pencil-fill"></i>
                                    </button>
                                    <button class="btn btn-sm btn-outline-danger" onclick="deleteTask(${task.id})">
                                        <i class="bi bi-trash-fill"></i>
                                    </button>
                                ` : '-'}
                            </td>
                        </tr>
                    `;
                }).join("");
            } catch (error) {
                UI.showAlert(error.message, "error");
            }
        }

        async function loadEmployeesDropdown(selectedId = null) {
            try {
                const employees = await API.get("/employees");
                const select = document.getElementById("task-assignee");
                
                select.innerHTML = `<option value="">-- Select Employee --</option>`;
                employees.forEach(emp => {
                    const option = document.createElement("option");
                    option.value = emp.id;
                    option.textContent = `${emp.first_name} ${emp.last_name} (${emp.position})`;
                    if (selectedId && parseInt(selectedId) === emp.id) {
                        option.selected = true;
                    }
                    select.appendChild(option);
                });
            } catch(e){}
        }

        function openCreateModal() {
            document.getElementById("taskModalLabel").textContent = "Create Onboarding Task";
            document.getElementById("edit-task-id").value = "";
            document.getElementById("task-form").reset();
            loadEmployeesDropdown();
        }

        async function openEditModal(id) {
            UI.showLoader();
            try {
                const task = await API.get(`/tasks/${id}`);
                document.getElementById("taskModalLabel").textContent = "Edit Onboarding Task";
                document.getElementById("edit-task-id").value = task.id;
                document.getElementById("task-title").value = task.title;
                document.getElementById("task-desc").value = task.description || "";
                document.getElementById("task-due").value = task.due_date || "";
                
                await loadEmployeesDropdown(task.employee_id);
                
                const modal = new bootstrap.Modal(document.getElementById("taskModal"));
                modal.show();
            } catch (error) {
                UI.showAlert(error.message, "error");
            } finally {
                UI.hideLoader();
            }
        }

        async function deleteTask(id) {
            if (!confirm("Are you sure you want to delete this task?")) return;
            UI.showLoader();
            try {
                await API.delete(`/tasks/${id}`);
                UI.showAlert("Task deleted successfully.");
                await loadTasksList();
            } catch (error) {
                UI.showAlert(error.message, "error");
            } finally {
                UI.hideLoader();
            }
        }

        async function toggleTaskStatus(id, checkbox) {
            const statusVal = checkbox.checked ? "completed" : "pending";
            try {
                await API.put(`/tasks/${id}`, { status: statusVal });
                UI.showAlert(`Task marked as ${statusVal}.`);
                await loadTasksList();
            } catch (error) {
                checkbox.checked = !checkbox.checked; // Revert checkbox
                UI.showAlert(error.message, "error");
            }
        }

        document.getElementById("task-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const editId = document.getElementById("edit-task-id").value;
            
            const payload = {
                title: document.getElementById("task-title").value,
                description: document.getElementById("task-desc").value || null,
                due_date: document.getElementById("task-due").value || null,
                employee_id: parseInt(document.getElementById("task-assignee").value)
            };

            const modalElement = document.getElementById("taskModal");
            const modal = bootstrap.Modal.getInstance(modalElement) || new bootstrap.Modal(modalElement);
            modal.hide();

            UI.showLoader();
            try {
                if (editId) {
                    await API.put(`/tasks/${editId}`, payload);
                    UI.showAlert("Task updated successfully.");
                } else {
                    await API.post("/tasks/", payload);
                    UI.showAlert("Task assigned successfully.");
                }
                await loadTasksList();
            } catch (error) {
                UI.showAlert(error.message, "error");
            } finally {
                UI.hideLoader();
            }
        });

        // Init
        if (Auth.isAuthenticated()) {
            initTasks();
        }
    </script>
</body>
</html>
