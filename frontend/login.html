<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - OnboardGenius AI</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body class="auth-bg">

    <div class="auth-card fade-in">
        <div class="text-center mb-4">
            <a href="index.html" class="text-decoration-none fw-bold fs-3 text-dark">
                <i class="bi bi-rocket-takeoff-fill text-primary"></i> Onboard<span class="text-primary">Genius</span>
            </a>
            <h5 class="text-muted mt-2">Sign in to your account</h5>
        </div>
        
        <form id="login-form">
            <div class="mb-3">
                <label for="email" class="form-label fw-semibold">Email address</label>
                <input type="email" class="form-control" id="email" required placeholder="name@company.com">
            </div>
            <div class="mb-4">
                <label for="password" class="form-label fw-semibold">Password</label>
                <input type="password" class="form-control" id="password" required placeholder="••••••••">
            </div>
            
            <button type="submit" class="btn btn-gradient w-100 py-2.5 mb-3">Sign In</button>
        </form>

        <div class="text-center">
            <span class="text-muted small">Don't have an account? <a href="register.html" class="text-decoration-none fw-semibold">Register here</a></span>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/config.js"></script>
    <script src="static/js/auth.js"></script>
    <script src="static/js/api.js"></script>
    <script src="static/js/main.js"></script>
    <script>
        document.getElementById("login-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            UI.showLoader();
            
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            
            // Login endpoint requires URL-encoded form data (OAuth2 standard)
            const formData = new URLSearchParams();
            formData.append("username", email);
            formData.append("password", password);
            
            try {
                // Direct fetch since login form uses urlencoded standard instead of json
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded"
                    },
                    body: formData
                });
                
                if (!response.ok) {
                    let errDetail = "Incorrect email or password.";
                    try {
                        const errObj = await response.json();
                        errDetail = errObj.detail || errDetail;
                    } catch (err) {}
                    throw new Error(errDetail);
                }
                
                const data = await response.json();
                Auth.saveToken(data.access_token);
                window.location.href = "dashboard.html";
            } catch (error) {
                UI.hideLoader();
                UI.showAlert(error.message, "error");
            }
        });
    </script>
</body>
</html>
