<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management - OnboardGenius AI</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>

    <!-- Sidebar Mounted here -->
    <div id="sidebar-root"></div>

    <!-- Main Wrapper -->
    <div class="main-wrapper">
        <div class="container-fluid fade-in">
            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
                <div>
                    <h1 class="fw-bold h2 mb-1">Employee Directory</h1>
                    <p class="text-muted mb-0">Manage onboarding profiles, statuses, and links.</p>
                </div>
                <div>
                    <button class="btn btn-gradient" data-bs-toggle="modal" data-bs-target="#employeeModal" onclick="openCreateModal()">
                        <i class="bi bi-person-plus-fill"></i> Add Profile
                    </button>
                </div>
            </div>

            <!-- Table Card -->
            <div class="premium-card">
                <div class="table-responsive">
                    <table class="table align-middle mb-0">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Department</th>
                                <th>Position</th>
                                <th>Hire Date</th>
                                <th>Status</th>
                                <th class="text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="employees-table-body">
                            <tr>
                                <td colspan="6" class="text-center py-4 text-muted">No employees registered yet.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Employee Form Modal -->
    <div class="modal fade" id="employeeModal" tabindex="-1" aria-labelledby="employeeModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-dark text-white border-0">
                    <h5 class="modal-title fw-bold" id="employeeModalLabel">Employee Profile</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="employee-form">
                    <input type="hidden" id="edit-employee-id">
                    <div class="modal-body py-4">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="first-name" class="form-label fw-semibold">First Name</label>
                                <input type="text" class="form-control" id="first-name" required placeholder="e.g. John">
                            </div>
                            <div class="col-md-6">
                                <label for="last-name" class="form-label fw-semibold">Last Name</label>
                                <input type="text" class="form-control" id="last-name" required placeholder="e.g. Doe">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="phone" class="form-label fw-semibold">Phone Number</label>
                            <input type="text" class="form-control" id="phone" placeholder="e.g. +1 555-0199">
                        </div>
                        <div class="mb-3">
                            <label for="department" class="form-label fw-semibold">Department</label>
                            <input type="text" class="form-control" id="department" required placeholder="e.g. Engineering">
                        </div>
                        <div class="mb-3">
                            <label for="position" class="form-label fw-semibold">Position</label>
                            <input type="text" class="form-control" id="position" required placeholder="e.g. Software Engineer">
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="hire-date" class="form-label fw-semibold">Hire Date</label>
                                <input type="date" class="form-control" id="hire-date" required>
                            </div>
                            <div class="col-md-6">
                                <label for="onboarding-status" class="form-label fw-semibold">Status</label>
                                <select class="form-select" id="onboarding-status">
                                    <option value="pending">Pending</option>
                                    <option value="in_progress">In Progress</option>
                                    <option value="completed">Completed</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="user-id" class="form-label fw-semibold">Linked User ID (Optional)</label>
                            <select class="form-select" id="user-id">
                                <option value="">-- Choose Account --</option>
                            </select>
                            <small class="text-muted">Link this profile to a login account email.</small>
                        </div>
                    </div>
                    <div class="modal-footer border-0">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-gradient">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/config.js"></script>
    <script src="static/js/auth.js"></script>
    <script src="static/js/api.js"></script>
    <script src="static/js/main.js"></script>
    <script>
        // Restrict page to HR / Admin only
        function checkRole() {
            const role = Auth.getUserRole();
            if (role !== "admin" && role !== "hr") {
                window.location.href = "dashboard.html";
            }
        }

        async function loadEmployees() {
            UI.showLoader();
            try {
                const employees = await API.get("/employees");
                const tbody = document.getElementById("employees-table-body");
                
                if (employees.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-muted">No employees registered yet.</td></tr>`;
                    return;
                }

                tbody.innerHTML = employees.map(emp => `
                    <tr>
                        <td>
                            <div class="fw-bold">${emp.first_name} ${emp.last_name}</div>
                            <small class="text-muted">${emp.phone || 'No phone'}</small>
                        </td>
                        <td>${emp.department || '-'}</td>
                        <td>${emp.position || '-'}</td>
                        <td>${new Date(emp.hire_date).toLocaleDateString()}</td>
                        <td>
                            <span class="badge-status ${emp.onboarding_status}">
                                ${emp.onboarding_status.replace('_', ' ')}
                            </span>
                        </td>
                        <td class="text-end">
                            <button class="btn btn-sm btn-outline-primary me-1" onclick="openEditModal(${emp.id})">
                                <i class="bi bi-pencil-fill"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteEmployee(${emp.id})">
                                <i class="bi bi-trash-fill"></i>
                            </button>
                        </td>
                    </tr>
                `).join("");
            } catch (error) {
                UI.showAlert(error.message, "error");
            } finally {
                UI.hideLoader();
            }
        }

        async function loadUsersDropdown(selectedUserId = null) {
            try {
                const users = await API.get("/users");
                const select = document.getElementById("user-id");
                
                // Keep the default option
                select.innerHTML = `<option value="">-- Choose Account --</option>`;
                
                users.forEach(u => {
                    const option = document.createElement("option");
                    option.value = u.id;
                    option.textContent = `${u.email} (${u.role})`;
                    if (selectedUserId && parseInt(selectedUserId) === u.id) {
                        option.selected = true;
                    }
                    select.appendChild(option);
                });
            } catch (e) {}
        }

        function openCreateModal() {
            document.getElementById("employeeModalLabel").textContent = "Add Employee Profile";
            document.getElementById("edit-employee-id").value = "";
            document.getElementById("employee-form").reset();
            loadUsersDropdown();
        }

        async function openEditModal(id) {
            UI.showLoader();
            try {
                const emp = await API.get(`/employees/${id}`);
                document.getElementById("employeeModalLabel").textContent = "Edit Employee Profile";
                document.getElementById("edit-employee-id").value = emp.id;
                document.getElementById("first-name").value = emp.first_name;
                document.getElementById("last-name").value = emp.last_name;
                document.getElementById("phone").value = emp.phone || "";
                document.getElementById("department").value = emp.department || "";
                document.getElementById("position").value = emp.position || "";
                document.getElementById("hire-date").value = emp.hire_date;
                document.getElementById("onboarding-status").value = emp.onboarding_status;
                
                await loadUsersDropdown(emp.user_id);
                
                const modal = new bootstrap.Modal(document.getElementById("employeeModal"));
                modal.show();
            } catch (error) {
                UI.showAlert(error.message, "error");
            } finally {
                UI.hideLoader();
            }
        }

        async function deleteEmployee(id) {
            if (!confirm("Are you sure you want to delete this employee profile?")) return;
            UI.showLoader();
            try {
                await API.delete(`/employees/${id}`);
                UI.showAlert("Employee profile successfully deleted.");
                await loadEmployees();
            } catch (error) {
                UI.showAlert(error.message, "error");
            } finally {
                UI.hideLoader();
            }
        }

        document.getElementById("employee-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const editId = document.getElementById("edit-employee-id").value;
            
            const payload = {
                first_name: document.getElementById("first-name").value,
                last_name: document.getElementById("last-name").value,
                phone: document.getElementById("phone").value || null,
                department: document.getElementById("department").value,
                position: document.getElementById("position").value,
                hire_date: document.getElementById("hire-date").value,
                onboarding_status: document.getElementById("onboarding-status").value,
                user_id: document.getElementById("user-id").value ? parseInt(document.getElementById("user-id").value) : null
            };

            const modalElement = document.getElementById("employeeModal");
            const modal = bootstrap.Modal.getInstance(modalElement) || new bootstrap.Modal(modalElement);
            modal.hide();

            UI.showLoader();
            try {
                if (editId) {
                    await API.put(`/employees/${editId}`, payload);
                    UI.showAlert("Employee profile updated successfully.");
                } else {
                    await API.post("/employees/", payload);
                    UI.showAlert("Employee profile created successfully.");
                }
                await loadEmployees();
            } catch (error) {
                UI.showAlert(error.message, "error");
            } finally {
                UI.hideLoader();
            }
        });

        // Init
        if (Auth.isAuthenticated()) {
            checkRole();
            loadEmployees();
        }
    </script>
</body>
</html>
