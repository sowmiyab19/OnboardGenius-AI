<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documents Management - OnboardGenius AI</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>

    <!-- Sidebar Mounted here -->
    <div id="sidebar-root"></div>

    <!-- Main Wrapper -->
    <div class="main-wrapper">
        <div class="container-fluid fade-in">
            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
                <div>
                    <h1 class="fw-bold h2 mb-1">HR Documents Portal</h1>
                    <p class="text-muted mb-0">Upload credentials, signed contracts, or policy handovers securely.</p>
                </div>
            </div>

            <div class="row g-4">
                <!-- Left: Upload New File -->
                <div class="col-lg-4">
                    <div class="premium-card">
                        <h5 class="fw-bold mb-3"><i class="bi bi-file-earmark-arrow-up-fill text-primary"></i> Upload Document</h5>
                        <form id="upload-form">
                            <div class="mb-3">
                                <label for="doc-title" class="form-label fw-semibold">Document Title</label>
                                <input type="text" class="form-control" id="doc-title" required placeholder="e.g. W-4 Tax Form">
                            </div>
                            
                            <!-- HR Dropdown to assign user, Employee just gets mapped to self -->
                            <div id="employee-assign-wrapper" class="mb-3 d-none">
                                <label for="doc-employee" class="form-label fw-semibold">Select Employee</label>
                                <select class="form-select" id="doc-employee">
                                    <option value="">-- Choose Employee --</option>
                                </select>
                            </div>

                            <div class="mb-4">
                                <label for="doc-file" class="form-label fw-semibold">Choose File (PDF, DOCX, Image)</label>
                                <input class="form-control" type="file" id="doc-file" required>
                            </div>
                            
                            <button type="submit" class="btn btn-gradient w-100 py-2.5">Upload File</button>
                        </form>
                    </div>
                </div>

                <!-- Right: List files -->
                <div class="col-lg-8">
                    <div class="premium-card">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h5 class="fw-bold mb-0"><i class="bi bi-folder-fill text-primary"></i> Uploaded Files</h5>
                            
                            <!-- HR employee filter -->
                            <div id="filter-wrapper" class="d-none" style="width: 250px;">
                                <select class="form-select form-select-sm" id="filter-employee" onchange="loadDocumentsList()">
                                    <option value="">-- Select Employee to view --</option>
                                </select>
                            </div>
                        </div>

                        <div class="table-responsive">
                            <table class="table align-middle mb-0">
                                <thead>
                                    <tr>
                                        <th>File Name</th>
                                        <th>File Type</th>
                                        <th>Uploaded Date</th>
                                        <th class="text-end">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="docs-table-body">
                                    <tr>
                                        <td colspan="4" class="text-center py-4 text-muted">No files uploaded yet.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/config.js"></script>
    <script src="static/js/auth.js"></script>
    <script src="static/js/api.js"></script>
    <script src="static/js/main.js"></script>
    <script>
        let isHrUser = false;
        let currentEmployeeProfile = null;

        async function initDocuments() {
            UI.showLoader();
            try {
                const user = await API.get("/auth/me");
                isHrUser = (user.role === "admin" || user.role === "hr");

                if (isHrUser) {
                    document.getElementById("employee-assign-wrapper").classList.remove("d-none");
                    document.getElementById("doc-employee").required = true;
                    document.getElementById("filter-wrapper").classList.remove("d-none");
                    await loadEmployeesDropdown();
                } else {
                    try {
                        currentEmployeeProfile = await API.get(`/employees/user/${user.id}`);
                        await loadDocumentsList();
                    } catch (e) {
                        UI.showAlert("Please complete your employee profile first.", "error");
                        return;
                    }
                }
            } catch (error) {
                UI.showAlert(error.message, "error");
            } finally {
                UI.hideLoader();
            }
        }

        async function loadEmployeesDropdown() {
            try {
                const employees = await API.get("/employees");
                const uploadSelect = document.getElementById("doc-employee");
                const filterSelect = document.getElementById("filter-employee");
                
                employees.forEach(emp => {
                    const text = `${emp.first_name} ${emp.last_name}`;
                    
                    const opt1 = document.createElement("option");
                    opt1.value = emp.id;
                    opt1.textContent = text;
                    uploadSelect.appendChild(opt1);

                    const opt2 = document.createElement("option");
                    opt2.value = emp.id;
                    opt2.textContent = text;
                    filterSelect.appendChild(opt2);
                });
            } catch (e) {}
        }

        async function loadDocumentsList() {
            let targetEmployeeId = null;

            if (isHrUser) {
                targetEmployeeId = document.getElementById("filter-employee").value;
                if (!targetEmployeeId) {
                    document.getElementById("docs-table-body").innerHTML = `<tr><td colspan="4" class="text-center py-4 text-muted">Select an employee filter to load files.</td></tr>`;
                    return;
                }
            } else {
                targetEmployeeId = currentEmployeeProfile.id;
            }

            UI.showLoader();
            try {
                const docs = await API.get(`/documents/employee/${targetEmployeeId}`);
                const tbody = document.getElementById("docs-table-body");
                
                if (docs.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" class="text-center py-4 text-muted">No files uploaded yet.</td></tr>`;
                    return;
                }

                tbody.innerHTML = docs.map(doc => `
                    <tr>
                        <td>
                            <div class="fw-bold"><i class="bi bi-file-earmark-text text-primary me-2"></i> ${doc.title}</div>
                        </td>
                        <td>${doc.file_type || 'Unknown'}</td>
                        <td>${new Date(doc.uploaded_at).toLocaleDateString()}</td>
                        <td class="text-end">
                            <button class="btn btn-sm btn-outline-success me-1" onclick="downloadFile(${doc.id})">
                                <i class="bi bi-download"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteDocument(${doc.id})">
                                <i class="bi bi-trash-fill"></i>
                            </button>
                        </td>
                    </tr>
                `).join("");
            } catch (error) {
                UI.showAlert(error.message, "error");
            } finally {
                UI.hideLoader();
            }
        }

        async function downloadFile(docId) {
            UI.showLoader();
            try {
                const response = await fetch(`${API_BASE_URL}/documents/${docId}/download`, {
    headers: {
        "Authorization": `Bearer ${Auth.getToken()}`
    }
});
                
                if (!response.ok) throw new Error("Failed to download file.");
                
                const blob = await response.blob();
                const disposition = response.headers.get('Content-Disposition');
                let filename = "downloaded_file";
                if (disposition && disposition.indexOf('filename=') !== -1) {
                    filename = disposition.split('filename=')[1].replace(/['"]/g, '');
                }
                
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);
            } catch (error) {
                UI.showAlert(error.message, "error");
            } finally {
                UI.hideLoader();
            }
        }

        async function deleteDocument(docId) {
            if (!confirm("Are you sure you want to delete this document?")) return;
            UI.showLoader();
            try {
                await API.delete(`/documents/${docId}`);
                UI.showAlert("Document deleted successfully.");
                await loadDocumentsList();
            } catch (error) {
                UI.showAlert(error.message, "error");
            } finally {
                UI.hideLoader();
            }
        }

        document.getElementById("upload-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const title = document.getElementById("doc-title").value;
            const fileInput = document.getElementById("doc-file");
            
            if (fileInput.files.length === 0) {
                UI.showAlert("Please choose a file to upload.", "error");
                return;
            }

            let employeeId = null;
            if (isHrUser) {
                employeeId = document.getElementById("doc-employee").value;
            } else {
                employeeId = currentEmployeeProfile.id;
            }

            const formData = new FormData();
            formData.append("title", title);
            formData.append("employee_id", employeeId);
            formData.append("file", fileInput.files[0]);

            UI.showLoader();
            try {
                await API.postMultipart("/documents/", formData);
                UI.showAlert("File uploaded successfully.");
                document.getElementById("doc-title").value = "";
                fileInput.value = "";
                
                // If HR is viewing the same user filter, refresh list
                if (isHrUser) {
                    document.getElementById("filter-employee").value = employeeId;
                }
                await loadDocumentsList();
            } catch (error) {
                UI.showAlert(error.message, "error");
            } finally {
                UI.hideLoader();
            }
        });

        // Init
        if (Auth.isAuthenticated()) {
            initDocuments();
        }
    </script>
</body>
</html>
